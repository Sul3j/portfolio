<section class="projects row">
  <div class="projects__header col-12 pl-4 mt-5 pt-4 pl-lg-0 mb-lg-3 pt-md-5">
    <div class="projects__header-content">
      <h2 class="projects__header-text">Projekty</h2>
    </div>
  </div>
  <div class="col-12 col-md-6 col-lg-4 mt-4" *ngFor="let card of cards">
    <div class="card projects__card">
      <h2 class="projects__title">{{ card.title | uppercase }}</h2>
      <p class="projects__text">{{ card.description }}</p>
      <div class="projects__tags">
        <span class="badge badge-secondary projects__tag" *ngFor="let tag of card.tags">{{
          tag
        }}</span>
      </div>
      <div class="projects__buttons">
        <a [href]="card.code" class="btn btn-secondary projects__button"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-github projects__icon"
          >
            <path
              d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
            ></path></svg
        ></a>
        <a [href]="card.app" class="btn btn-secondary projects__button"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-eye projects__icon"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle></svg
        ></a>
        <a [href]="card.yt" class="btn btn-secondary projects__button"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-youtube projects__icon"
          >
            <path
              d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"
            ></path>
            <polygon
              points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"
            ></polygon></svg
        ></a>
      </div>
    </div>
  </div>
</section>
